<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">한걸음韓文學習 App 圖示</title>
  <desc id="desc">簡潔的紫色圓角圖示，中央奶油白字卡寫著韓文字 한，右上角有一個薄荷綠圓點。</desc>
  <defs>
    <linearGradient id="background" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7569E3"/>
      <stop offset="1" stop-color="#5549C3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#342B8B" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#background)"/>

  <g filter="url(#shadow)">
    <rect x="88" y="88" width="336" height="336" rx="88" fill="#FFFDF7"/>
  </g>

  <circle cx="386" cy="126" r="22" fill="#8FD6BD"/>

  <text x="256" y="330" text-anchor="middle" fill="#5146BD"
    font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif"
    font-size="210" font-weight="900">한</text>
</svg>
